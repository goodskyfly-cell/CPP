<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>杯子歌大師 - 巨大居中版</title>
    <style>
        :root { --main: #2d3436; --accent: #d63031; --bg: #f5f6fa; --green: #00b894; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: flex-start; height: 100vh; margin: 0; padding-top: 30px; overflow: hidden; }
        
        /* 控制面板穩定在頂部 */
        #control-panel { background: white; padding: 20px 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; margin-bottom: 25px; width: 550px; }
        .bpm-controls { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 15px 0; }
        input[type=number] { width: 70px; padding: 8px; font-size: 20px; border-radius: 8px; border: 2px solid #eee; text-align: center; }
        input[type=range] { width: 280px; cursor: pointer; }
        
        /* 綠色框格：範圍加大並強制居中 */
        #display-stage { 
            background: white; 
            width: 92%;           /* 加大寬度範圍 */
            height: 450px;        /* 加大高度範圍 */
            max-width: 1400px;
            border-radius: 40px; 
            position: relative; 
            display: flex;        /* 啟用 Flexbox */
            align-items: center;  /* 垂直居中 */
            justify-content: center; /* 水平居中 */
            border: 12px solid var(--green); /* 加粗邊框感 */
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            margin-top: 10px;
        }

        /* 文字巨大化與間距調整 */
        .content-wrapper { display: flex; align-items: center; justify-content: center; width: 100%; }
        .measure { display: flex; gap: 60px; font-size: 130px; font-weight: 900; color: var(--main); }
        .divider { width: 8px; height: 200px; background: #eee; margin: 0 60px; border-radius: 4px; }
        
        .word { position: relative; color: var(--main); transition: color 0.1s; }
        .active { color: var(--accent) !important; text-shadow: 0 0 30px rgba(214, 48, 49, 0.4); }
        
        #ball { 
            position: absolute; 
            width: 45px; height: 45px; 
            background: var(--accent); 
            border-radius: 50%; 
            display: none; 
            z-index: 10;
            transition: left 0.1s linear, top 0.12s ease-out;
        }

        button { padding: 15px 50px; font-size: 24px; font-weight: bold; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 15px; transition: 0.2s; }
        button:hover { background: #0056b3; transform: translateY(-2px); }

        #info-panel { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; align-items: center; gap: 50px; color: #b2bec3; font-size: 24px; }
    </style>
</head>
<body>

<div id="control-panel">
    <div style="font-weight:bold; font-size:22px; color: #2d3436;">練習速度 BPM 設定</div>
    <div class="bpm-controls">
        <input type="range" id="bpm-slider" min="40" max="180" value="80">
        <input type="number" id="bpm-number" min="40" max="180" value="80">
    </div>
    <button id="play-btn">啟動雙次循環練習</button>
</div>

<div id="display-stage">
    <div id="ball"></div>
    <div class="content-wrapper">
        <div id="measure-1" class="measure"></div>
        <div class="divider"></div>
        <div id="measure-2" class="measure"></div>
    </div>
    <div id="info-panel">
        <span id="progress-text">進度：1 / 8</span>
        <span id="repeat-indicator" style="color: var(--accent); font-weight: bold; opacity: 0;">REPEAT!</span>
    </div>
</div>

<script>
    const songSequence = [
        { m1: ["拍", "拍"], m2: ["拍", "拿", "放"] },
        { m1: ["拍", "拿", "放"], m2: ["拍", "拿", "放"] },
        { m1: ["拍", "拍", "桌"], m2: ["拍", "拿", "放"] },
        { m1: ["拍", "拍", "桌", "桌"], m2: ["拍", "拿", "放"] },
        { m1: ["拍", "拿", "放", "拍"], m2: ["拍", "拿", "放"] },
        { m1: ["拍", "拍", "拿"], m2: ["放", "放", "放"] },
        { m1: ["拍", "拍", "拿", "放"], m2: ["拍", "拿", "放"] },
        { m1: ["拍", "桌", "拿", "放"], m2: ["桌", "拿", "放"] }
    ];

    let currentLine = 0, isPlaying = false, audioCtx;
    const bpmSlider = document.getElementById('bpm-slider');
    const bpmNumber = document.getElementById('bpm-number');
    const playBtn = document.getElementById('play-btn');
    const ball = document.getElementById('ball');
    const repeatIndicator = document.getElementById('repeat-indicator');

    bpmSlider.oninput = () => bpmNumber.value = bpmSlider.value;
    bpmNumber.oninput = () => bpmSlider.value = bpmNumber.value;

    function renderLine(idx) {
        const line = songSequence[idx];
        document.getElementById('measure-1').innerHTML = line.m1.map(w => `<span class="word">${w}</span>`).join('');
        document.getElementById('measure-2').innerHTML = line.m2.map(w => `<span class="word">${w}</span>`).join('');
        document.getElementById('progress-text').innerText = `目前動作組別：${idx + 1} / ${songSequence.length}`;
    }

    function playTick(f) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = f;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    async function playMeasure(containerId, actions) {
        const spans = document.getElementById(containerId).querySelectorAll('.word');
        const beatMs = (60 / parseInt(bpmNumber.value)) * 1000;
        let steps = actions.length === 2 ? [beatMs, beatMs] : [beatMs/2, beatMs/2, beatMs/2, beatMs/2];

        for (let i = 0; i < steps.length; i++) {
            if (!isPlaying) return;
            document.querySelectorAll('.word').forEach(s => s.classList.remove('active'));

            if (i < actions.length) {
                const rect = spans[i].getBoundingClientRect();
                const stageRect = document.getElementById('display-stage').getBoundingClientRect();
                ball.style.display = 'block';
                ball.style.left = (rect.left - stageRect.left + rect.width / 2 - 22.5) + "px";
                ball.style.top = (rect.top - stageRect.top - 65) + "px";
                spans[i].classList.add('active');
                playTick(i === 0 ? 880 : 440);
            }
            await new Promise(r => setTimeout(r, steps[i]));
        }
    }

    async function mainLoop() {
        while (isPlaying) {
            renderLine(currentLine);
            for (let r = 1; r <= 2; r++) {
                if (!isPlaying) break;
                repeatIndicator.style.opacity = (r === 2) ? "1" : "0";
                await playMeasure('measure-1', songSequence[currentLine].m1);
                await playMeasure('measure-2', songSequence[currentLine].m2);
                if (r === 1 && isPlaying) await new Promise(res => setTimeout(res, 200));
            }
            currentLine = (currentLine + 1) % songSequence.length;
            if (isPlaying) await new Promise(res => setTimeout(res, 600));
        }
    }

    playBtn.onclick = () => {
        if (isPlaying) {
            isPlaying = false;
            playBtn.innerText = "啟動雙次循環練習";
            ball.style.display = 'none';
            repeatIndicator.style.opacity = "0";
            document.querySelectorAll('.word').forEach(s => s.classList.remove('active'));
        } else {
            if (audioCtx?.state === 'suspended') audioCtx.resume();
            isPlaying = true;
            playBtn.innerText = "停止練習";
            mainLoop();
        }
    };

    renderLine(0);
</script>
</body>
</html>
