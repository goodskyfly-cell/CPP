<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>杯子歌大師 - 7秒前奏倍速版</title>
    <style>
        :root { --main: #2d3436; --accent: #d63031; --bg: #f5f6fa; --green: #00b894; --blue: #0984e3; --purple: #6c5ce7; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; height: 100vh; margin: 0; padding-top: 20px; overflow: hidden; }
        
        #control-panel { background: white; padding: 20px 40px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; margin-bottom: 20px; width: 700px; }
        .speed-label { font-weight: bold; color: var(--main); font-size: 20px; margin-bottom: 12px; }
        
        /* 倍速按鈕樣式 */
        .speed-group { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; }
        .speed-btn { background: #eee; color: #636e72; padding: 10px 20px; border-radius: 10px; cursor: pointer; border: 2px solid transparent; font-weight: bold; transition: 0.2s; font-size: 16px; }
        .speed-btn.active { background: var(--purple); color: white; border-color: var(--purple); transform: scale(1.05); }

        .btn-group { display: flex; gap: 15px; justify-content: center; }
        button.main-btn { padding: 14px 40px; font-size: 20px; font-weight: bold; cursor: pointer; border: none; border-radius: 15px; transition: 0.2s; color: white; }
        #play-btn { background: var(--blue); width: 280px; }
        #reset-btn { background: #b2bec3; width: 200px; }
        button.main-btn:hover { opacity: 0.9; transform: translateY(-2px); }
        
        #display-stage { 
            background: white; width: 94%; height: 520px; max-width: 1400px;
            border-radius: 40px; position: relative; display: flex; align-items: center; justify-content: center;
            border: 12px solid var(--green); box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        .measure { display: flex; gap: 60px; font-size: 145px; font-weight: 900; color: var(--main); }
        .divider { width: 8px; height: 260px; background: #eee; margin: 0 60px; }
        .word { color: var(--main); transition: color 0.1s; }
        .active { color: var(--accent) !important; text-shadow: 0 0 35px rgba(214, 48, 49, 0.4); }
        
        #ball { position: absolute; width: 48px; height: 48px; background: var(--accent); border-radius: 50%; display: none; z-index: 10; transition: left 0.1s linear, top 0.12s ease-out; }
        
        #countdown-overlay { position: absolute; font-size: 240px; font-weight: 900; color: var(--blue); display: none; z-index: 20; }
        .go-text { color: var(--purple) !important; font-size: 300px !important; }
        
        #info-panel { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 60px; color: #b2bec3; font-size: 24px; }
    </style>
</head>
<body>

<div id="control-panel">
    <div class="speed-label">調整練習速度 (BPM: 115)</div>
    <div class="speed-group">
        <div class="speed-btn" data-rate="0.5">50%</div>
        <div class="speed-btn" data-rate="0.75">75%</div>
        <div class="speed-btn active" data-rate="1.0">100%</div>
        <div class="speed-btn" data-rate="1.25">125%</div>
        <div class="speed-btn" data-rate="1.5">150%</div>
    </div>
    <div class="btn-group">
        <button id="play-btn" class="main-btn">啟動 (7秒前奏)</button>
        <button id="reset-btn" class="main-btn">一鍵重新開始</button>
    </div>
</div>

<div id="display-stage">
    <div id="countdown-overlay">7</div>
    <div id="ball"></div>
    <div id="content-area" style="display: flex; align-items: center;">
        <div id="measure-1" class="measure"></div>
        <div class="divider"></div>
        <div id="measure-2" class="measure"></div>
    </div>
    <div id="info-panel">
        <span id="progress-text">準備就緒</span>
        <span id="repeat-indicator" style="color: var(--accent); font-weight: bold; opacity: 0;">REPEAT!</span>
    </div>
</div>

<script>
    const bgMusic = new Audio('https://raw.githubusercontent.com/goodskyfly-cell/CPP/main/CPP.mp3');
    const songSequence = [
        { m1: ["拍", "拍"], m2: ["拍", "拿", "放"] },
        { m1: ["拍", "拿", "放"], m2: ["拍", "拿", "放"] },
        { m1: ["拍", "拍", "桌"], m2: ["拍", "拿", "放"] },
        { m1: ["拍", "拍", "桌", "桌"], m2: ["拍", "拿", "放"] },
        { m1: ["拍", "拿", "放", "拍"], m2: ["拍", "拿", "放"] },
        { m1: ["拍", "拍", "拿"], m2: ["放", "放", "放"] },
        { m1: ["拍", "拍", "拿", "放"], m2: ["拍", "拿", "放"] },
        { m1: ["拍", "桌", "拿", "放"], m2: ["桌", "拿", "放"] }
    ];

    let currentLine = 0, isPlaying = false, audioCtx, currentRate = 1.0;
    const baseBpm = 115;
    const playBtn = document.getElementById('play-btn');
    const resetBtn = document.getElementById('reset-btn');
    const ball = document.getElementById('ball');
    const countdownOverlay = document.getElementById('countdown-overlay');
    const contentArea = document.getElementById('content-area');

    document.querySelectorAll('.speed-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentRate = parseFloat(btn.dataset.rate);
            if(isPlaying) bgMusic.playbackRate = currentRate;
        };
    });

    function renderLine(idx) {
        if (idx >= songSequence.length) return;
        const line = songSequence[idx];
        document.getElementById('measure-1').innerHTML = line.m1.map(w => `<span class="word">${w}</span>`).join('');
        document.getElementById('measure-2').innerHTML = line.m2.map(w => `<span class="word">${w}</span>`).join('');
        document.getElementById('progress-text').innerText = `組別：${idx + 1} / ${songSequence.length}`;
    }

    async function startIntro() {
        countdownOverlay.style.display = 'block';
        countdownOverlay.classList.remove('go-text');
        contentArea.style.opacity = '0.1';
        
        bgMusic.playbackRate = currentRate;
        bgMusic.play();

        // 7 秒倒數序列
        const countValues = ["7", "6", "5", "4", "3", "2", "1", "GO!"];
        const countStep = 1000 / currentRate; 

        for (let val of countValues) {
            if (!isPlaying) return false;
            countdownOverlay.innerText = val;
            if (val === "GO!") {
                countdownOverlay.classList.add('go-text');
                await new Promise(r => setTimeout(r, countStep * 0.4));
            } else {
                await new Promise(r => setTimeout(r, countStep));
            }
        }
        countdownOverlay.style.display = 'none';
        contentArea.style.opacity = '1';
        return true;
    }

    async function playMeasure(containerId, actions, isLastOfRepeat) {
        const spans = document.getElementById(containerId).querySelectorAll('.word');
        const dynamicBpm = baseBpm * currentRate;
        const beatMs = (60 / dynamicBpm) * 1000;
        let steps = actions.length === 2 ? [beatMs, beatMs] : [beatMs/2, beatMs/2, beatMs/2, beatMs/2];

        for (let i = 0; i < steps.length; i++) {
            if (!isPlaying) return;
            if (isLastOfRepeat && i === steps.length - 1) {
                const nextIdx = currentLine + 1;
                if (nextIdx < songSequence.length) {
                    setTimeout(() => { if(isPlaying) renderLine(nextIdx); }, steps[i] / 2);
                }
            }
            document.querySelectorAll('.word').forEach(s => s.classList.remove('active'));
            if (i < actions.length) {
                const rect = spans[i].getBoundingClientRect();
                const stageRect = document.getElementById('display-stage').getBoundingClientRect();
                ball.style.display = 'block';
                ball.style.left = (rect.left - stageRect.left + rect.width / 2 - 24) + "px";
                ball.style.top = (rect.top - stageRect.top - 75) + "px";
                spans[i].classList.add('active');
            }
            await new Promise(r => setTimeout(r, steps[i]));
        }
    }

    async function mainLoop() {
        if (await startIntro()) {
            renderLine(0);
            for (currentLine = 0; currentLine < songSequence.length; currentLine++) {
                if (!isPlaying) break;
                for (let r = 1; r <= 2; r++) {
                    if (!isPlaying) break;
                    document.getElementById('repeat-indicator').style.opacity = (r === 2) ? "1" : "0";
                    await playMeasure('measure-1', songSequence[currentLine].m1, false);
                    await playMeasure('measure-2', songSequence[currentLine].m2, r === 2);
                }
            }
            if (isPlaying) stopEverything();
        }
    }

    function stopEverything() {
        isPlaying = false;
        bgMusic.pause();
        bgMusic.currentTime = 0;
        playBtn.innerText = "啟動 (7秒前奏)";
        ball.style.display = 'none';
        countdownOverlay.style.display = 'none';
        contentArea.style.opacity = '1';
        document.querySelectorAll('.word').forEach(s => s.classList.remove('active'));
        document.getElementById('repeat-indicator').style.opacity = "0";
        document.getElementById('progress-text').innerText = "練習完畢";
    }

    playBtn.onclick = () => {
        if (isPlaying) stopEverything();
        else {
            isPlaying = true;
            playBtn.innerText = "停止練習";
            mainLoop();
        }
    };

    resetBtn.onclick = () => {
        isPlaying = false;
        stopEverything();
        setTimeout(() => {
            isPlaying = true;
            playBtn.innerText = "停止練習";
            mainLoop();
        }, 200);
    };

    renderLine(0);
</script>
</body>
</html>
